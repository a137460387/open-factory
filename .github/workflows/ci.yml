name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun >= 1.3
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun run test

  rust:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun >= 1.3
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build frontend
        run: bun run build
        working-directory: .

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Audit
        run: cargo audit

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun >= 1.3
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bunx playwright test --workers=2 --retries=1 --reporter=list,html
        working-directory: apps/desktop

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/desktop/playwright-report/
          retention-days: 7

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun >= 1.3
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit npm dependencies
        run: bun audit --audit-level=high || exit 1

      - name: Audit Rust dependencies (stale check)
        run: cargo audit --stale
        working-directory: apps/desktop/src-tauri
